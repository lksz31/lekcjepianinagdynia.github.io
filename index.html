<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lekcje Pianina - Łukasz Ganczarek</title>

<style>
/* ================= GLOBAL ================= */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@400;700&display=swap');

:root {
  --gold: #d4af37;
  --navy: #1e3a8a;
  --bg-clean: #ffffff;
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: white;
}

/* ================= SLIDER ================= */
.slider-container {
  width: 100%;
  opacity: 0;
  transition: 1s;
}
.slider-container.revealed { opacity: 1; }

.tiles-wrapper {
  display: flex;
  gap: 40px;
  overflow-x: auto;
  padding: 60px 20px;
}

.tile {
  min-width: 280px;
  padding: 40px;
  border-radius: 40px;
  background: white;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
  text-align: center;
  opacity: 0.3;
  transform: scale(0.9);
  transition: 0.5s;
}
.tile.is-visible {
  opacity: 1;
  transform: scale(1);
}

h3 { color: var(--navy); margin-bottom: 10px; }
.highlight { color: var(--gold); }

/* ================= PIANO ================= */
.piano-container {
  overflow-x: auto;
  padding: 20px;
}
.piano {
  display: flex;
}
.key {
  width: 60px;
  height: 200px;
  border: 1px solid #333;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  cursor: pointer;
}
.key.black {
  background: black;
  color: white;
  height: 120px;
  margin: 0 -20px;
  z-index: 2;
}
.key.playing { background: #ddd; }

/* ================= BENTO ================= */
.bento-container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  padding: 40px;
}
.card {
  padding: 25px;
  border-radius: 25px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}

/* ================= FORM ================= */
.main-section {
  background: var(--navy);
  padding: 40px;
  color: white;
}
.btn-open-form {
  background: var(--gold);
  border: none;
  padding: 15px 30px;
  border-radius: 30px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- ================= SLIDER ================= -->
<div class="slider-container" id="mainContainer">
  <div class="tiles-wrapper" id="slider"></div>
</div>

<!-- ================= PIANO ================= -->
<div class="piano-container">
  <div class="piano" id="piano"></div>
</div>

<!-- ================= BENTO ================= -->
<div class="bento-container">
  <div class="card">
    <h3>Poznajmy się</h3>
    <p>Jestem <b>Łukasz Ganczarek</b> — nauczyciel pianina.</p>
  </div>

  <div class="card">
    <h3>Media</h3>
    <a href="https://youtu.be/0Ls1o_2eJ8c" target="_blank">Zobacz film</a>
  </div>
</div>

<!-- ================= REZERWACJA ================= -->
<div class="main-section">
  <h2>Rezerwacja</h2>
  <button class="btn-open-form" onclick="alert('Formularz działa 👍')">ZAREZERWUJ</button>
</div>

<script>
/* ================= SLIDER ================= */
const slider = document.getElementById('slider');

const content = `
<div class="tile"><h3>Instrument</h3><p><span class="highlight">Dowieziemy pianino</span></p></div>
<div class="tile"><h3>Koszt</h3><p><span class="highlight">99 zł / h</span></p></div>
<div class="tile"><h3>Dla kogo</h3><p><span class="highlight">Od 6 lat</span></p></div>
`;

slider.innerHTML = content.repeat(10);

window.onload = () => {
  document.getElementById('mainContainer').classList.add('revealed');
};

const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if(e.isIntersecting) e.target.classList.add('is-visible');
  });
}, {threshold: 0.5});

document.querySelectorAll('.tile').forEach(t => observer.observe(t));

/* ================= PIANO ================= */
const piano = document.getElementById('piano');
const AudioContext = window.AudioContext || window.webkitAudioContext;
const ctx = new AudioContext();

for(let i=0;i<12;i++){
  const key = document.createElement('div');
  key.className = 'key';
  key.onclick = () => {
    const osc = ctx.createOscillator();
    osc.frequency.value = 220 * Math.pow(2, i/12);
    osc.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.5);
    key.classList.add('playing');
    setTimeout(()=>key.classList.remove('playing'),200);
  };
  piano.appendChild(key);
}
</script>

</body>
</html>
