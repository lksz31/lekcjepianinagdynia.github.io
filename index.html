Lekcje pianina
<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://googleapis.com');

  :root {
    --gold: #d4af37;
    --navy: #1e3a8a;
    --bg-clean: #ffffff;
    /* DESKTOP */
    --tile-width: 320px;
    --gap: 60px;
    --h3-size: 1.7rem;
    --p-size: 0.95rem;
  }

  /* --- ZMNIEJSZENIE O POŁOWĘ NA TELEFONACH --- */
  @media (max-width: 768px) {
    :root {
      --tile-width: 170px; /* O połowę mniejszy niż desktop */
      --gap: 15px;
      --h3-size: 1.0rem;   /* Mniejszy tytuł */
      --p-size: 0.75rem;   /* Mniejszy opis */
    }
    .tile { 
      padding: 20px 15px !important; 
      min-height: 190px !important; /* Znacznie niższy kafelek */
      border-radius: 25px !important;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05) !important;
    }
    .nav-btn { 
      width: 35px !important; 
      height: 35px !important; 
      font-size: 0.8rem !important; 
    }
    .tiles-wrapper { padding: 40px 0 !important; }
  }

  /* EKSTREMALNIE MAŁE EKRANY */
  @media (max-width: 480px) {
    :root {
      --tile-width: 145px;
      --h3-size: 0.9rem;
      --p-size: 0.65rem;
    }
    .tile { min-height: 160px !important; }
  }

  body {
    margin: 0;
    padding: 0;
    background-color: var(--bg-clean);
    font-family: 'Poppins', sans-serif;
    display: flex;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .slider-container {
    width: 100%;
    position: relative;
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
    -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
    mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
  }

  .slider-container.revealed { opacity: 1; }

  .tiles-wrapper {
    display: flex;
    align-items: center;
    gap: var(--gap);
    padding: 80px 0;
    overflow-x: auto;
    scrollbar-width: none;
    scroll-behavior: smooth;
  }

  .tiles-wrapper::-webkit-scrollbar { display: none; }

  .tile {
    flex: 0 0 var(--tile-width);
    background: white;
    padding: 50px 40px;
    border-radius: 55px;
    box-sizing: border-box;
    box-shadow: 0 0 25px rgba(0, 0, 0, 0.06); 
    border: 1px solid #f0f0f0;
    min-height: 320px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s, filter 0.8s, box-shadow 0.8s;
    opacity: 0.15;
    transform: scale(0.85);
    filter: blur(4px);
  }

  .tile.is-visible {
    opacity: 1;
    transform: scale(1.05);
    filter: blur(0px);
    box-shadow: 0 20px 50px rgba(30, 58, 138, 0.1);
    border-color: #e5e7eb;
  }

  h3 { 
    font-family: 'Playfair Display', serif; 
    color: var(--navy); 
    font-size: var(--h3-size); 
    margin: 0 0 8px 0; 
  }
  
  p { 
    color: #64748b; 
    font-size: var(--p-size); 
    line-height: 1.4; 
    margin: 0; 
  }

  .highlight { color: var(--gold); font-weight: 600; }

  .nav-btn {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 60px;
    height: 60px;
    background: white;
    border: 1px solid #f0f0f0;
    border-radius: 50%;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    cursor: pointer;
    z-index: 1000;
    font-size: 1.2rem;
    color: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
    opacity: 0;
  }

  .slider-container.revealed ~ .nav-btn { opacity: 1; }
  .nav-btn:hover { background: var(--navy); color: white; transform: translateY(-50%) scale(1.1); }
  .prev-btn { left: 3%; }
  .next-btn { right: 3%; }
</style>
</head>
<body>

<div class="slider-container" id="mainContainer">
  <div class="tiles-wrapper" id="slider"></div>
</div>

<button class="nav-btn prev-btn" id="prev">❮</button>
<button class="nav-btn next-btn" id="next">❯</button>

<script>
  const slider = document.getElementById('slider');
  const container = document.getElementById('mainContainer');
  const nextBtn = document.getElementById('next');
  const prevBtn = document.getElementById('prev');

  const getScrollStep = () => {
    const tile = document.querySelector('.tile');
    const style = window.getComputedStyle(slider);
    const gap = parseInt(style.gap) || 0;
    return tile.offsetWidth + gap;
  };

  const content = `
    <div class="tile"><h3>Instrument</h3><p>Nie masz instrumentu? <span class="highlight">Dowieziemy pianino</span> (+20 zł) lub studio.</p></div>
    <div class="tile"><h3>Dydaktyka</h3><p>Pracujemy na <span class="highlight">autorskich</span> pomocach dopasowanych do ucznia.</p></div>
    <div class="tile"><h3>Koszt</h3><p>Standardowa cena za lekcję to <span class="highlight">99 zł / h</span>.</p></div>
    <div class="tile"><h3>Dla kogo</h3><p>Zapraszamy wszystkich <span class="highlight">od 6 roku życia</span> wzwyż.</p></div>
    <div class="tile"><h3>Miejsce</h3><p>Studio w <span class="highlight">Gdyni</span> lub dojazd: <span class="highlight">Gdynia i Sopot</span>.</p></div>
  `;

  slider.innerHTML = content.repeat(20);

  const resetToCenterOne = () => {
    const allTiles = document.querySelectorAll('.tile');
    const targetIndex = Math.floor(allTiles.length / 2); 
    const targetTile = allTiles[targetIndex];
    const offset = targetTile.offsetLeft - (window.innerWidth / 2) + (targetTile.offsetWidth / 2);
    slider.scrollLeft = offset;
  };

  window.addEventListener('load', () => {
    resetToCenterOne();
    setTimeout(() => { container.classList.add('revealed'); }, 100); 
  });

  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(resetToCenterOne, 150);
  });

  nextBtn.onclick = () => slider.scrollBy({ left: getScrollStep(), behavior: 'smooth' });
  prevBtn.onclick = () => slider.scrollBy({ left: -getScrollStep(), behavior: 'smooth' });

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting && entry.intersectionRatio > 0.6) {
        entry.target.classList.add('is-visible');
      } else {
        entry.target.classList.remove('is-visible');
      }
    });
  }, { root: slider, threshold: 0.6 });

  document.querySelectorAll('.tile').forEach(tile => observer.observe(tile));
</script>


<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pianino Edukacyjne Premium</title>
    <style>
        @import url('https://googleapis.com');

        :root {
            /* DUŻA KLAWIATURA NA KOMPUTER (Zwiększone wymiary) */
            --key-w: 65px;      /* Szerokość białego klawisza */
            --key-h: 280px;     /* Wysokość białego klawisza */
            --black-w: 42px;    /* Szerokość czarnego klawisza */
            --black-h: 170px;   /* Wysokość czarnego klawisza */
            --black-m: -21px;   /* Margines czarnego */
            --font-label: 13px; /* Wielkość liter na klawiszach */
        }

        /* TABLET */
        @media (max-width: 1024px) {
            :root { --key-w: 50px; --key-h: 210px; --black-w: 32px; --black-h: 125px; --black-m: -16px; --font-label: 11px; }
        }

        /* MINIATUROWA KLAWIATURA NA TELEFON */
        @media (max-width: 768px) {
            :root {
                --key-w: 26px;
                --key-h: 110px;
                --black-w: 18px;
                --black-h: 65px;
                --black-m: -9px;
                --font-label: 7px;
            }
            body { padding: 5px; }
            .controls-wrapper { padding: 8px 10px !important; gap: 5px !important; margin-bottom: 10px !important; }
            .btn { padding: 4px 8px !important; font-size: 0.65rem !important; border-width: 1px !important; }
            input[type=range] { width: 60px !important; }
            .mobile-mute-warning { display: block !important; }
        }

        body {
            background-color: #ffffff;
            margin: 0;
            padding: 20px;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        .mobile-mute-warning {
            display: none;
            background: #fff5f5;
            border: 1px solid #feb2b2;
            color: #c53030;
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 0.75rem;
            margin-bottom: 10px;
            text-align: center;
            max-width: 95%;
            font-weight: 600;
        }

        .controls-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 15px 30px;
            border-radius: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            margin-bottom: 30px;
            border: 1px solid #f0f0f0;
        }

        .btn {
            padding: 8px 18px;
            border-radius: 50px;
            border: 2px solid #1e3a8a;
            background: white;
            color: #1e3a8a;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .btn.active { background: #1e3a8a; color: white; }
        .btn-song.active { background: #3b82f6; border-color: #3b82f6; color: white; }

        .volume-container { display: flex; align-items: center; gap: 10px; color: #1e3a8a; font-weight: 700; }
        input[type=range] { cursor: pointer; accent-color: #1e3a8a; width: 100px; }

        .piano-container {
            width: 100%;
            display: flex;
            justify-content: center;
            overflow-x: auto;
            padding: 10px 0;
            scrollbar-width: none;
        }
        .piano-container::-webkit-scrollbar { display: none; }

        .piano { display: flex; position: relative; margin: 0 auto; }

        .key {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            cursor: pointer;
            border: 1px solid #333;
            box-sizing: border-box;
            padding-bottom: 12px;
            transition: 0.1s;
            position: relative;
        }

        .key span { font-size: var(--font-label); font-weight: 800; pointer-events: none; }

        .piano-mode .white { width: var(--key-w); height: var(--key-h); background: white; border-radius: 0 0 6px 6px; z-index: 1; }
        .piano-mode .white span { color: #94a3b8; }
        .piano-mode .black { width: var(--black-w); height: var(--black-h); background: #111; margin: 0 var(--black-m); z-index: 2; border-radius: 0 0 4px 4px; }
        .piano-mode .black span { color: white; }

        .harpsi-mode .white { width: var(--key-w); height: var(--key-h); background: #1a1a1a; z-index: 1; }
        .harpsi-mode .white span { color: #555; }
        .harpsi-mode .black { width: var(--black-w); height: var(--black-h); background: #d4af37; margin: 0 var(--black-m); z-index: 2; }
        .harpsi-mode .black span { color: black; }

        .key.next-note { background: #3b82f6 !important; box-shadow: inset 0 0 20px rgba(255,255,255,0.6); z-index: 3; transform: translateY(-5px); }
        .key.next-note span { color: white !important; }

        .key:active, .key.playing { background: #e2e8f0 !important; transform: translateY(3px); filter: brightness(1.1); }
        .piano-mode .black:active, .piano-mode .black.playing { background: #333 !important; }

        #status { font-weight: 700; color: #94a3b8; margin-top: 15px; font-size: 1rem; text-align: center; }
        .sep { width: 1px; height: 30px; background: #e2e8f0; }
    </style>
</head>
<body class="piano-mode">
    <div class="controls-wrapper">
        <button class="btn active" id="p-btn" onclick="changeInst('piano')">Pianino</button>
        <button class="btn" id="h-btn" onclick="changeInst('harpsi')">Klawesyn</button>
        <div class="sep"></div>
        <div class="volume-container">
            <input type="range" id="volume" min="0" max="1" step="0.05" value="0.4">
        </div>
        <div class="sep"></div>
        <button class="btn btn-song" id="s0" onclick="toggleSong(0)">🍎 Jabłuszko</button>
        <button class="btn btn-song" id="s1" onclick="toggleSong(1)">🐱 Kotek</button>
        <button class="btn btn-song" id="s2" onclick="toggleSong(2)">👨‍🌾 Janie</button>
    </div>

    <div class="piano-container">
        <div class="piano" id="piano"></div>
    </div>

    <div id="status">Wybierz utwór i graj podświetlone klawisze</div>

<script>
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();
    let currentInst = 'piano';
    let currentSong = null;
    let step = 0;

    function unlockAudio() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        window.removeEventListener('touchstart', unlockAudio);
        window.removeEventListener('mousedown', unlockAudio);
    }
    window.addEventListener('touchstart', unlockAudio);
    window.addEventListener('mousedown', unlockAudio);

    const songs = [
        { name: "Czerwone jabłuszko", notes: [5, 9, 12, 12, 7, 10, 12, 10, 9, 7, 5, 12, 5, 9, 12, 12, 7, 10, 12, 10, 9, 7, 9, 5] },
        { name: "Wlazł kotek", notes: [12, 9, 9, 10, 7, 7, 5, 9, 12, 12, 9, 9, 10, 7, 7, 5, 9, 5, 5, 9, 9, 10, 7, 7, 5, 9, 12, 12, 9, 9, 10, 7, 7, 5, 9, 5] },
        { name: "Panie Janie", notes: [5, 7, 9, 5, 5, 7, 9, 5, 9, 10, 12, 9, 10, 12, 12, 14, 12, 10, 9, 5, 12, 14, 12, 10, 9, 5, 5, 0, 5, 5, 0, 5] }
    ];

    function playSound(freq, index) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (currentSong !== null && index === songs[currentSong].notes[step]) {
            step++;
            if (step >= songs[currentSong].notes.length) {
                document.getElementById('status').innerText = "Brawo! Ukończono utwór!";
                const sIndex = currentSong;
                setTimeout(() => toggleSong(sIndex), 100);
            } else { updateHighlight(); }
        }
        const vol = document.getElementById('volume').value;
        const now = audioCtx.currentTime;
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(vol, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 1.2);
        const osc = audioCtx.createOscillator();
        osc.type = (currentInst === 'piano') ? 'triangle' : 'sawtooth';
        osc.frequency.setValueAtTime(freq, now);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(now + 1.2);
    }

    function toggleSong(index) {
        if (currentSong === index) {
            currentSong = null; step = 0;
            document.querySelectorAll('.btn-song').forEach(b => b.classList.remove('active'));
            document.getElementById('status').innerText = "Tryb wolnej gry";
        } else {
            document.querySelectorAll('.btn-song').forEach(b => b.classList.remove('active'));
            currentSong = index; step = 0;
            document.getElementById(`s${index}`).classList.add('active');
            document.getElementById('status').innerText = "Nauka: " + songs[index].name;
        }
        updateHighlight();
    }

    function updateHighlight() {
        document.querySelectorAll('.key').forEach(k => k.classList.remove('next-note'));
        if (currentSong !== null) {
            const target = songs[currentSong].notes[step];
            const keys = document.querySelectorAll('.key');
            if (keys[target]) keys[target].classList.add('next-note');
        }
    }

    function changeInst(inst) {
        currentInst = inst;
        document.body.className = (inst === 'piano') ? 'piano-mode' : 'harpsi-mode';
        document.getElementById('p-btn').classList.toggle('active', inst === 'piano');
        document.getElementById('h-btn').classList.toggle('active', inst === 'harpsi');
    }

    const notesPattern = ['G', 'G#', 'A', 'A#', 'H', 'C', 'C#', 'D', 'D#', 'E', 'F', 'F#'];
    const startFreq = 195.997; 
    const piano = document.getElementById('piano');

    for (let i = 0; i < 25; i++) {
        const noteIndex = i % 12;
        let noteName = notesPattern[noteIndex];
        const freq = startFreq * Math.pow(2, i / 12);
        const key = document.createElement('div');
        const isBlack = noteName.includes('#');
        key.className = `key ${isBlack ? 'black' : 'white'}`;
        let label = (i < 5) ? noteName.toLowerCase() : (i < 17 ? noteName.toUpperCase() + "¹" : noteName.toUpperCase() + "²");
        key.innerHTML = `<span>${label}</span>`;
        key.addEventListener('mousedown', (e) => { e.preventDefault(); key.classList.add('playing'); playSound(freq, i); });
        window.addEventListener('mouseup', () => key.classList.remove('playing'));
        key.addEventListener('touchstart', (e) => { e.preventDefault(); key.classList.add('playing'); playSound(freq, i); }, {passive: false});
        key.addEventListener('touchend', () => { key.classList.remove('playing'); });
        piano.appendChild(key);
    }
</script>
</body>
</html>
