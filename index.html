.booking-section,
.bento-footer {
  position: relative;
  overflow: hidden;
}
.modal-overlay {
  position: absolute;
  inset: 0;
  background: white;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  box-sizing: border-box;
  color: var(--navy, #1e3a8a);
  clip-path: circle(0% at 50% 90%);
  transition: clip-path 0.8s cubic-bezier(0.7, 0, 0.3, 1);
  overflow-y: auto;
}
.modal-overlay.open {
  clip-path: circle(150% at 50% 90%);
}
.footer-modal {
  clip-path: circle(0% at 50% 50%);
}
.footer-modal.open {
  clip-path: circle(150% at 50% 50%);
}
.modal-close {
  position: absolute;
  top: 16px;
  right: 24px;
  font-size: 1.8rem;
  color: var(--navy, #1e3a8a);
  cursor: pointer;
  font-weight: 900;
  z-index: 110;
}
.modal-content {
  width: 100%;
  max-width: 560px;
  text-align: center;
}
.modal-split {
  width: 94%;
  max-width: 860px;
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: 22px;
  align-items: center;
}
.modal-left h3,
.modal-content h3 {
  margin: 0 0 14px;
  color: var(--navy, #1e3a8a);
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
}
.modal-price {
  background: #f9fbfe;
  border: 2px dashed var(--gold, #d4af37);
  border-radius: 15px;
  padding: 12px;
  margin-bottom: 15px;
  text-align: center;
}
.modal-price span {
  font-weight: 900;
  font-size: 1.35rem;
}
.modal-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 14px;
}
.modal-tile {
  background: #fff;
  border: 1px solid #eee;
  border-radius: 14px;
  padding: 12px;
  text-align: left;
  cursor: pointer;
  transition: 0.25s;
  font-size: 0.85rem;
  color: #333;
}
.modal-tile.selected {
  border-color: var(--blue, #3b82f6);
  background: #f0f7ff;
}
.modal-form {
  background: var(--navy, #1e3a8a);
  border-radius: 28px;
  padding: 22px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  position: relative;
}
.modal-form input,
.modal-form textarea {
  width: 100%;
  padding: 12px;
  border-radius: 14px;
  border: 2px solid transparent;
  font-family: 'Poppins', sans-serif;
  font-size: 0.9rem;
  box-sizing: border-box;
  transition: 0.25s;
}
.modal-form input.error {
  border-color: #ff4d4d !important;
  background: #fff5f5;
}
.modal-submit {
  width: 100%;
  background: #ccc;
  color: #666;
  border: none;
  padding: 15px;
  border-radius: 50px;
  font-weight: 900;
  cursor: not-allowed;
  transition: 0.25s;
}
.modal-submit.active {
  background: var(--gold, #d4af37);
  color: #000;
  cursor: pointer;
}
.modal-tip {
  display: none;
  position: absolute;
  bottom: 76px;
  left: 50%;
  transform: translateX(-50%);
  background: #ff4d4d;
  color: white;
  padding: 7px 13px;
  border-radius: 9px;
  font-size: 0.72rem;
  width: 230px;
  text-align: center;
  z-index: 10;
}
@media (max-width: 850px) {
  .modal-split {
    grid-template-columns: 1fr;
    padding: 35px 0 20px;

  <script>
/* =========================================================
   WSPÓLNY WEBHOOK — TWÓJ LINK
   ========================================================= */
const PERSONAL_WEBHOOK = '[hook.eu1.make.com](https://hook.eu1.make.com/d62azmfruksckfjj8gtwyxjvxt9aqdis)';
/* =========================================================
   FORMULARZ REZERWACJI — SEKCJA KALENDARZA
   ========================================================= */
let bookingIsStudio = true;
let bookingHasPiano = true;
function bookingToggleForm(show) {
  document.getElementById('bookingOverlay').classList.toggle('open', show);
}
function bookingSetLoc(loc) {
  bookingIsStudio = loc === 'studio';
  document.getElementById('booking-loc-studio').classList.toggle('selected', bookingIsStudio);
  document.getElementById('booking-loc-uczen').classList.toggle('selected', !bookingIsStudio);
  document.getElementById('booking-piano-options').style.display = bookingIsStudio ? 'none' : 'block';
  bookingUpdatePrice();
}
function bookingSetPiano(value) {
  bookingHasPiano = value;
  document.getElementById('booking-piano-yes').classList.toggle('selected', bookingHasPiano);
  document.getElementById('booking-piano-no').classList.toggle('selected', !bookingHasPiano);
  bookingUpdatePrice();
}
function bookingUpdatePrice() {
  const price = bookingIsStudio ? 99 : (bookingHasPiano ? 99 : 119);
  document.getElementById('booking-price').innerText = price + ' zł / h';
  bookingValidate();
}
function bookingValidate() {
  const name = document.getElementById('booking-name').value.trim();
  const phoneDigits = document.getElementById('booking-phone').value.replace(/\D/g, '');
  const btn = document.getElementById('booking-submit');
  btn.classList.toggle('active', name.length > 2 && phoneDigits.length >= 9);
  if (name.length > 2 && phoneDigits.length >= 9) {
    document.getElementById('booking-tip').style.display = 'none';
  }
}
function bookingShowMissing() {
  const btn = document.getElementById('booking-submit');
  if (btn.classList.contains('active')) return;
  const name = document.getElementById('booking-name');
  const phone = document.getElementById('booking-phone');
  const tip = document.getElementById('booking-tip');
  const missing = [];
  if (name.value.trim().length <= 2) {
    name.classList.add('error');
    missing.push('Imię');
  }
  if (phone.value.replace(/\D/g, '').length < 9) {
    phone.classList.add('error');
    missing.push('9 cyfr telefonu');
  }
  tip.innerText = 'Podaj: ' + missing.join(' oraz ');
  tip.style.display = 'block';
}
function bookingClearErrors() {
  document.querySelectorAll('#booking-form-box input').forEach(input => input.classList.remove('error'));
  document.getElementById('booking-tip').style.display = 'none';
}
function bookingSend() {
  const btn = document.getElementById('booking-submit');
  if (!btn.classList.contains('active')) return;
  btn.innerText = 'WYSYŁANIE...';
  btn.style.pointerEvents = 'none';
  const data = {
    typ: 'Rezerwacja Terminu',
    miejsce: bookingIsStudio ? 'W studio' : 'U ucznia',
    pianino: bookingIsStudio ? 'N/A' : (bookingHasPiano ? 'Tak' : 'Brak'),
    imie: document.getElementById('booking-name').value,
    telefon: document.getElementById('booking-phone').value,
    wiadomosc: document.getElementById('booking-msg').value,
    cena: document.getElementById('booking-price').innerText
  };
  fetch(PERSONAL_WEBHOOK, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  })
  .then(res => {
    if (!res.ok) throw new Error('Błąd wysyłki');
    btn.innerText = 'WYSŁANO!';
    btn.style.background = '#22c55e';
    setTimeout(() => {
      bookingToggleForm(false);
      document.getElementById('booking-name').value = '';
      document.getElementById('booking-phone').value = '';
      document.getElementById('booking-msg').value = '';
      btn.innerText = 'WYŚLIJ ZGŁOSZENIE';
      btn.style.background = '';
      btn.style.pointerEvents = 'auto';
      btn.classList.remove('active');
    }, 2000);
  })
  .catch(() => {
    btn.innerText = 'SPRÓBUJ PONOWNIE';
    btn.style.background = '#ef4444';
    btn.style.color = 'white';
    btn.style.pointerEvents = 'auto';
  });
}
/* =========================================================
   FORMULARZE STOPKI
   ========================================================= */
let footerIsStudio = true;
let footerHasPiano = true;
function footerToggleOverlay(id, show) {
  document.getElementById(id).classList.toggle('open', show);
}
function footerSetLoc(loc) {
  footerIsStudio = loc === 'studio';
  document.getElementById('footer-loc-studio').classList.toggle('selected', footerIsStudio);
  document.getElementById('footer-loc-uczen').classList.toggle('selected', !footerIsStudio);
  document.getElementById('footer-piano-options').style.display = footerIsStudio ? 'none' : 'block';
  footerUpdatePrice();
}
function footerSetPiano(value) {
  footerHasPiano = value;
  document.getElementById('footer-piano-yes').classList.toggle('selected', footerHasPiano);
  document.getElementById('footer-piano-no').classList.toggle('selected', !footerHasPiano);
  footerUpdatePrice();
}
function footerUpdatePrice() {
  const price = footerIsStudio ? 99 : (footerHasPiano ? 99 : 119);
  document.getElementById('footer-price').innerText = price + ' zł / h';
}
function footerValidate(type) {
  let name;
  let contact;
  let btn;
  if (type === 'lesson') {
    name = document.getElementById('footer-lesson-name');
    contact = document.getElementById('footer-lesson-phone');
    btn = document.getElementById('footer-lesson-submit');
  }
  if (type === 'email') {
    name = document.getElementById('footer-email-name');
    contact = document.getElementById('footer-email-contact');
    btn = document.getElementById('footer-email-submit');
  }
  if (type === 'wa') {
    name = document.getElementById('footer-wa-name');
    contact = document.getElementById('footer-wa-phone');
    btn = document.getElementById('footer-wa-submit');
  }
  const isNameOk = name.value.trim().length > 2;
  const isContactOk = type === 'email'
    ? contact.value.includes('@')
    : contact.value.replace(/\D/g, '').length >= 9;
  btn.classList.toggle('active', isNameOk && isContactOk);
}
function footerShowErr(nameId, contactId, formId) {
  const form = document.getElementById(formId);
  const name = document.getElementById(nameId);
  const contact = document.getElementById(contactId);
  const btn = form.querySelector('.modal-submit');
  const tip = form.querySelector('.modal-tip');
  if (btn.classList.contains('active')) return;
  const isEmail = contact.type === 'email';
  const isNameInvalid = name.value.trim().length <= 2;
  const isContactInvalid = isEmail
    ? !contact.value.includes('@')
    : contact.value.replace(/\D/g, '').length < 9;
  const missing = [];
  if (isNameInvalid) {
    name.classList.add('error');
    missing.push('Imię');
  }
  if (isContactInvalid) {
    contact.classList.add('error');
    missing.push(isEmail ? 'E-mail' : '9 cyfr tel.');
  }
  tip.innerText = 'Podaj: ' + missing.join(' oraz ');
  tip.style.display = 'block';
}
function footerHideErr(formId) {
  const form = document.getElementById(formId);
  form.querySelectorAll('input').forEach(input => input.classList.remove('error'));
  form.querySelector('.modal-tip').style.display = 'none';
}
function footerSend(type) {
  let nameId;
  let contactId;
  let msgId;
  let formId;
  let overlayId;
  let buttonId;
  if (type === 'lesson') {
    nameId = 'footer-lesson-name';
    contactId = 'footer-lesson-phone';
    msgId = 'footer-lesson-msg';
    formId = 'footer-lesson-form';
    overlayId = 'lessonOverlay';
    buttonId = 'footer-lesson-submit';
  }
  if (type === 'email') {
    nameId = 'footer-email-name';
    contactId = 'footer-email-contact';
    msgId = 'footer-email-msg';
    formId = 'footer-email-form';
    overlayId = 'emailOverlay';
    buttonId = 'footer-email-submit';
  }
  if (type === 'wa') {
    nameId = 'footer-wa-name';
    contactId = 'footer-wa-phone';
    msgId = 'footer-wa-msg';
    formId = 'footer-wa-form';
    overlayId = 'waOverlay';
    buttonId = 'footer-wa-submit';
  }
  const btn = document.getElementById(buttonId);
  if (!btn.classList.contains('active')) return;
  btn.innerText = 'WYSYŁANIE...';
  btn.style.pointerEvents = 'none';
  const payload = {
    typ: type === 'lesson' ? 'Lekcja Próbna' : (type === 'email' ? 'Email' : 'WhatsApp'),
    imie: document.getElementById(nameId).value,
    kontakt: document.getElementById(contactId).value,
    wiadomosc: document.getElementById(msgId).value,
    miejsce: type === 'lesson' ? (footerIsStudio ? 'W studio' : 'U ucznia') : 'N/A',
    cena: type === 'lesson' ? document.getElementById('footer-price').innerText : 'N/A',
    pianino: type === 'lesson' ? (footerIsStudio ? 'N/A' : (footerHasPiano ? 'Uczeń posiada' : 'Brak - dowóz')) : 'N/A'
  };
  fetch(PERSONAL_WEBHOOK, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(res => {
    if (!res.ok) throw new Error('Błąd wysyłki');
    btn.innerText = 'WYSŁANO!';
    btn.style.background = '#22c55e';
    setTimeout(() => {
      footerToggleOverlay(overlayId, false);
      document.querySelectorAll(`#${formId} input, #${formId} textarea`).forEach(input => {
        input.value = '';
      });
      btn.classList.remove('active');
      btn.innerText = type === 'wa'
        ? 'POPROŚ O KONTAKT'
        : (type === 'email' ? 'WYŚLIJ WIADOMOŚĆ' : 'WYŚLIJ PROŚBĘ');
      btn.style.background = '';
      btn.style.color = '';
      btn.style.pointerEvents = 'auto';
    }, 2000);
  })
  .catch(() => {
    btn.innerText = 'SPRÓBUJ PONOWNIE';
    btn.style.background = '#ef4444';
    btn.style.color = 'white';
    btn.style.pointerEvents = 'auto';
  });
}
</script>
