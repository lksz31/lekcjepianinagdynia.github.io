<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oferta Lekcji Muzyki</title>
<!-- Poprawne importy czcionek -->
<link href="https://googleapis.com" rel="stylesheet">

<style>
  :root {
    --gold: #c5a028;
    --navy: #1a2e6b;
    --bg-clean: #f8fafc;
    --tile-width: 320px;
    --gap: 40px;
    --h3-size: 1.8rem;
    --p-size: 1rem;
  }

  /* Responsywność dla urządzeń mobilnych */
  @media (max-width: 768px) {
    :root {
      --tile-width: 200px;
      --gap: 20px;
      --h3-size: 1.2rem;
      --p-size: 0.85rem;
    }
    .tile { 
      padding: 30px 20px !important; 
      min-height: 220px !important; 
      border-radius: 30px !important;
    }
    .nav-btn { 
      width: 45px !important; 
      height: 45px !important; 
      font-size: 0.9rem !important; 
    }
  }

  body {
    margin: 0;
    padding: 0;
    background-color: var(--bg-clean);
    font-family: 'Poppins', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* Kontener główny z maską wygaszania na boki */
  .slider-container {
    width: 100%;
    position: relative;
    opacity: 0;
    transition: opacity 1s ease-in;
    -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
    mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
  }

  .slider-container.revealed { opacity: 1; }

  .tiles-wrapper {
    display: flex;
    align-items: center;
    gap: var(--gap);
    padding: 100px 0;
    overflow-x: auto;
    scrollbar-width: none; /* Firefox */
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }

  .tiles-wrapper::-webkit-scrollbar { display: none; } /* Chrome/Safari */

  .tile {
    flex: 0 0 var(--tile-width);
    background: #ffffff;
    padding: 50px 40px;
    border-radius: 50px;
    box-sizing: border-box;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04); 
    border: 1px solid rgba(0,0,0,0.03);
    min-height: 340px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
    transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    opacity: 0.2;
    transform: scale(0.8);
    filter: blur(2px);
  }

  /* Styl dla kafelka w centrum */
  .tile.is-visible {
    opacity: 1;
    transform: scale(1.1);
    filter: blur(0px);
    box-shadow: 0 25px 60px rgba(30, 58, 138, 0.12);
    border-color: rgba(30, 58, 138, 0.05);
  }

  h3 { 
    font-family: 'Playfair Display', serif; 
    color: var(--navy); 
    font-size: var(--h3-size); 
    margin: 0 0 15px 0; 
  }
  
  p { 
    color: #475569; 
    font-size: var(--p-size); 
    line-height: 1.6; 
    margin: 0; 
  }

  .highlight { 
    color: var(--gold); 
    font-weight: 600; 
    border-bottom: 1px solid rgba(197, 160, 40, 0.3);
  }

  /* Przyciski nawigacji */
  .nav-btn {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 65px;
    height: 65px;
    background: white;
    border: none;
    border-radius: 50%;
    box-shadow: 0 10px 25px rgba(0,0,0,0.06);
    cursor: pointer;
    z-index: 1000;
    font-size: 1.4rem;
    color: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .nav-btn:hover { 
    background: var(--navy); 
    color: white; 
    transform: translateY(-50%) scale(1.15); 
  }

  .prev-btn { left: 5%; }
  .next-btn { right: 5%; }

  /* Ukrycie przycisków na bardzo małych ekranach dla lepszego UX */
  @media (max-width: 480px) {
    .nav-btn { display: none; }
  }
</style>
</head>
<body>

<div class="slider-container" id="mainContainer">
  <div class="tiles-wrapper" id="slider"></div>
</div>

<button class="nav-btn prev-btn" id="prev" aria-label="Poprzedni">❮</button>
<button class="nav-btn next-btn" id="next" aria-label="Następny">❯</button>

<script>
  const slider = document.getElementById('slider');
  const container = document.getElementById('mainContainer');
  const nextBtn = document.getElementById('next');
  const prevBtn = document.getElementById('prev');

  const items = [
    { title: "Instrument", text: "Nie masz instrumentu? <span class='highlight'>Dowożę pianino</span> (+20 zł) lub zapraszam do studio." },
    { title: "Dydaktyka", text: "Pracuję na <span class='highlight'>autorskich</span> materiałach dopasowanych do Twojego tempa." },
    { title: "Koszt", text: "Inwestycja w rozwój to <span class='highlight'>99 zł / h</span> przy stałej współpracy." },
    { title: "Dla kogo", text: "Muzyka nie zna wieku. Zapraszam uczniów <span class='highlight'>od 6 roku życia</span>." },
    { title: "Miejsce", text: "Lekcje w studio w <span class='highlight'>Gdyni</span> lub dojazd na terenie <span class='highlight'>Sopotu</span>." }
  ];

  // Generowanie treści (powielenie dla efektu nieskończoności)
  const renderTiles = () => {
    const combinedContent = items.map(item => `
      <div class="tile">
        <h3>${item.title}</h3>
        <p>${item.text}</p>
      </div>
    `).join('');
    slider.innerHTML = combinedContent.repeat(10);
  };

  const getScrollStep = () => {
    const tile = document.querySelector('.tile');
    const gap = parseInt(window.getComputedStyle(slider).gap) || 0;
    return tile.offsetWidth + gap;
  };

  const resetToCenter = () => {
    const allTiles = document.querySelectorAll('.tile');
    const centerIndex = Math.floor(allTiles.length / 2);
    const targetTile = allTiles[centerIndex];
    const scrollPos = targetTile.offsetLeft - (window.innerWidth / 2) + (targetTile.offsetWidth / 2);
    slider.scrollLeft = scrollPos;
  };

  // Inicjalizacja
  renderTiles();

  window.addEventListener('load', () => {
    resetToCenter();
    setTimeout(() => { container.classList.add('revealed'); }, 300);
  });

  // Obsługa przycisków
  nextBtn.onclick = () => {
    slider.scrollBy({ left: getScrollStep(), behavior: 'smooth' });
  };

  prevBtn.onclick = () => {
    slider.scrollBy({ left: -getScrollStep(), behavior: 'smooth' });
  };

  // Intersection Observer dla efektu focusu na kafelku
  const observerOptions = {
    root: slider,
    threshold: 0.7
  };

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('is-visible');
      } else {
        entry.target.classList.remove('is-visible');
      }
    });
  }, observerOptions);

  document.querySelectorAll('.tile').forEach(tile => observer.observe(tile));

  // Obsługa zmiany rozmiaru okna
  let resizeTimeout;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(resetToCenter, 200);
  });
</script>

</body>
</html>
