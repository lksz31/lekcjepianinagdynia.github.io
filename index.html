<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lekcje Muzyki & Pianino Premium</title>
    <!-- Czcionki -->
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root {
            --gold: #c5a028;
            --navy: #1a2e6b;
            --bg-clean: #f8fafc;
            --tile-width: 320px;
            --gap: 40px;
            --key-w: 60px;
            --key-h: 250px;
            --black-w: 38px;
            --black-h: 150px;
            --black-m: -19px;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-clean);
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        /* Sekcja 1: Slider */
        section.hero {
            height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
        }

        .slider-container {
            width: 100%;
            opacity: 0;
            transition: opacity 1s ease-in;
            -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
            mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
        }
        .slider-container.revealed { opacity: 1; }

        .tiles-wrapper {
            display: flex;
            align-items: center;
            gap: var(--gap);
            padding: 100px 0;
            overflow-x: auto;
            scrollbar-width: none;
            scroll-behavior: smooth;
        }
        .tiles-wrapper::-webkit-scrollbar { display: none; }

        .tile {
            flex: 0 0 var(--tile-width);
            background: #ffffff;
            padding: 50px 40px;
            border-radius: 50px;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04); 
            border: 1px solid rgba(0,0,0,0.03);
            min-height: 340px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            opacity: 0.2;
            transform: scale(0.85);
            filter: blur(2px);
        }

        .tile.is-visible {
            opacity: 1;
            transform: scale(1.05);
            filter: blur(0px);
            box-shadow: 0 25px 60px rgba(30, 58, 138, 0.12);
        }

        h3 { font-family: 'Playfair Display', serif; color: var(--navy); font-size: 1.8rem; margin: 0 0 15px 0; }
        p { color: #475569; font-size: 1rem; line-height: 1.6; margin: 0; }
        .highlight { color: var(--gold); font-weight: 600; }

        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 60px; height: 60px; background: white; border: none;
            border-radius: 50%; box-shadow: 0 10px 25px rgba(0,0,0,0.06);
            cursor: pointer; z-index: 100; font-size: 1.2rem; color: var(--navy);
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .nav-btn:hover { background: var(--navy); color: white; transform: translateY(-50%) scale(1.1); }
        .prev-btn { left: 5%; } .next-btn { right: 5%; }

        /* Sekcja 2: Pianino */
        section.instrument {
            padding: 100px 20px;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-radius: 60px 60px 0 0;
            box-shadow: 0 -20px 40px rgba(0,0,0,0.02);
        }

        .controls-wrapper {
            display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: center;
            background: #f8fafc; padding: 15px 30px; border-radius: 40px; margin-bottom: 40px; border: 1px solid #f1f5f9;
        }

        .btn-piano {
            padding: 10px 20px; border-radius: 50px; border: 2px solid var(--navy);
            background: white; color: var(--navy); font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .btn-piano.active { background: var(--navy); color: white; }
        .btn-song.active { background: #3b82f6; border-color: #3b82f6; color: white; }

        .piano-container {
            width: 100%; display: flex; justify-content: center; overflow-x: auto; padding: 20px 0; scrollbar-width: none;
        }
        .piano-container::-webkit-scrollbar { display: none; }
        .piano { display: flex; position: relative; }

        .key {
            display: flex; align-items: flex-end; justify-content: center; cursor: pointer;
            border: 1px solid #e2e8f0; box-sizing: border-box; padding-bottom: 15px; transition: 0.1s;
        }
        .key span { font-size: 11px; font-weight: 800; pointer-events: none; color: #94a3b8; }

        .piano-mode .white { width: var(--key-w); height: var(--key-h); background: white; border-radius: 0 0 8px 8px; }
        .piano-mode .black { width: var(--black-w); height: var(--black-h); background: #1e293b; margin: 0 var(--black-m); z-index: 2; border-radius: 0 0 5px 5px; }
        .piano-mode .black span { color: white; }

        .harpsi-mode .white { width: var(--key-w); height: var(--key-h); background: #2d3748; border-color: #1a202c; }
        .harpsi-mode .black { width: var(--black-w); height: var(--black-h); background: var(--gold); margin: 0 var(--black-m); z-index: 2; }
        .harpsi-mode .black span { color: black; }

        .key.playing { transform: translateY(5px); background: #cbd5e1 !important; }
        .key.next-note { background: #3b82f6 !important; z-index: 3; box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        .key.next-note span { color: white !important; }

        #status { font-weight: 600; color: #64748b; margin-top: 20px; }

        /* Responsywność pianina na mobile */
        @media (max-width: 768px) {
            :root {
                --tile-width: 250px;
                --key-w: 32px; --key-h: 150px;
                --black-w: 20px; --black-h: 90px; --black-m: -10px;
            }
            .nav-btn { display: none; }
        }
    </style>
</head>
<body class="piano-mode">

    <!-- Sekcja 1: Slider -->
    <section class="hero">
        <button class="nav-btn prev-btn" id="prev">❮</button>
        <div class="slider-container" id="mainContainer">
            <div class="tiles-wrapper" id="slider"></div>
        </div>
        <button class="nav-btn next-btn" id="next">❯</button>
    </section>

    <!-- Sekcja 2: Pianino -->
    <section class="instrument">
        <h2 style="font-family: 'Playfair Display', serif; color: var(--navy); margin-bottom: 30px;">Wypróbuj interaktywne pianino</h2>
        <div class="controls-wrapper">
            <button class="btn-piano active" id="p-btn" onclick="changeInst('piano')">Pianino</button>
            <button class="btn-piano" id="h-btn" onclick="changeInst('harpsi')">Klawesyn</button>
            <div style="width: 1px; height: 30px; background: #e2e8f0; margin: 0 10px;"></div>
            <input type="range" id="volume" min="0" max="1" step="0.05" value="0.4">
            <div style="width: 1px; height: 30px; background: #e2e8f0; margin: 0 10px;"></div>
            <button class="btn-piano btn-song" id="s0" onclick="toggleSong(0)">🍎 Jabłuszko</button>
            <button class="btn-piano btn-song" id="s1" onclick="toggleSong(1)">🐱 Kotek</button>
        </div>

        <div class="piano-container">
            <div class="piano" id="piano"></div>
        </div>
        <div id="status">Wybierz utwór lub graj swobodnie</div>
    </section>

    <script>
        /* SCRIPT DLA SLIDERA */
        const slider = document.getElementById('slider');
        const container = document.getElementById('mainContainer');
        const items = [
            { title: "Instrument", text: "Nie masz instrumentu? <span class='highlight'>Dowożę pianino</span> lub zapraszam do studio." },
            { title: "Dydaktyka", text: "Pracuję na <span class='highlight'>autorskich</span> materiałach dopasowanych do ucznia." },
            { title: "Koszt", text: "Standardowa cena za lekcję to <span class='highlight'>99 zł / h</span>." },
            { title: "Miejsce", text: "Studio w <span class='highlight'>Gdyni</span> lub dojazd: Gdynia i Sopot." }
        ];

        slider.innerHTML = items.map(i => `<div class="tile"><h3>${i.title}</h3><p>${i.text}</p></div>`).join('').repeat(3);

        const resetToCenter = () => {
            const tiles = document.querySelectorAll('.tile');
            slider.scrollLeft = tiles[items.length].offsetLeft - (window.innerWidth / 2) + (tiles[0].offsetWidth / 2);
        };

        window.addEventListener('load', () => { resetToCenter(); container.classList.add('revealed'); });
        document.getElementById('next').onclick = () => slider.scrollBy({ left: 300, behavior: 'smooth' });
        document.getElementById('prev').onclick = () => slider.scrollBy({ left: -300, behavior: 'smooth' });

        const observer = new IntersectionObserver(entries => {
            entries.forEach(e => e.target.classList.toggle('is-visible', e.isIntersecting));
        }, { root: slider, threshold: 0.6 });
        document.querySelectorAll('.tile').forEach(t => observer.observe(t));

        /* SCRIPT DLA PIANINA */
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let currentInst = 'piano';
        let currentSong = null;
        let step = 0;

        const songs = [
            { name: "Jabłuszko", notes: [5, 9, 12, 12, 7, 10, 12, 10] },
            { name: "Wlazł kotek", notes: [12, 9, 9, 10, 7, 7, 5] }
        ];

        function playSound(freq, index) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            if (currentSong !== null && index === songs[currentSong].notes[step]) {
                step++;
                if (step >= songs[currentSong].notes.length) {
                    document.getElementById('status').innerText = "🎉 Brawo!";
                    setTimeout(() => toggleSong(currentSong), 1000);
                } else { updateHighlight(); }
            }

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = (currentInst === 'piano') ? 'triangle' : 'sawtooth';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(document.getElementById('volume').value, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 1);
        }

        function toggleSong(idx) {
            currentSong = (currentSong === idx) ? null : idx;
            step = 0;
            document.querySelectorAll('.btn-song').forEach((b, i) => b.classList.toggle('active', i === currentSong));
            document.getElementById('status').innerText = currentSong !== null ? "Graj podświetlone nuty" : "Tryb swobodny";
            updateHighlight();
        }

        function updateHighlight() {
            document.querySelectorAll('.key').forEach(k => k.classList.remove('next-note'));
            if (currentSong !== null) {
                const keys = document.querySelectorAll('.key');
                keys[songs[currentSong].notes[step]].classList.add('next-note');
            }
        }

        function changeInst(inst) {
            currentInst = inst;
            document.body.className = inst + '-mode';
            document.getElementById('p-btn').classList.toggle('active', inst === 'piano');
            document.getElementById('h-btn').classList.toggle('active', inst === 'harpsi');
        }

        const notesPattern = ['G', 'G#', 'A', 'A#', 'B', 'C', 'C#', 'D', 'D#', 'E', 'F', 'F#'];
        const pianoDiv = document.getElementById('piano');
        for (let i = 0; i < 25; i++) {
            const freq = 196 * Math.pow(2, i/12);
            const key = document.createElement('div');
            const isBlack = notesPattern[i % 12].includes('#');
            key.className = `key ${isBlack ? 'black' : 'white'}`;
            key.innerHTML = `<span>${notesPattern[i % 12]}</span>`;
            key.onmousedown = (e) => { e.preventDefault(); key.classList.add('playing'); playSound(freq, i); };
            window.addEventListener('mouseup', () => key.classList.remove('playing'));
            key.ontouchstart = (e) => { e.preventDefault(); key.classList.add('playing'); playSound(freq, i); };
            key.ontouchend = () => key.classList.remove('playing');
            pianoDiv.appendChild(key);
        }
    </script>
</body>
</html>
