<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lekcje Pianina Gdynia - Łukasz Ganczarek</title>
    
    <!-- Poprawne czcionki Google -->
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root {
            --gold: #d4af37; --navy: #1e3a8a; --blue: #3b82f6; --bg-clean: #ffffff;
            --tile-width: 320px; --gap: 60px;
            --key-w: 60px; --key-h: 240px; --black-w: 38px; --black-h: 140px; --black-m: -19px;
        }

        @media (max-width: 768px) {
            :root { --tile-width: 170px; --gap: 15px; --key-w: 26px; --key-h: 110px; --black-w: 18px; --black-h: 65px; --black-m: -9px; }
            .bento-container { grid-template-columns: 1fr !important; }
        }

        body { margin: 0; padding: 0; background: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        section { padding: 60px 20px; max-width: 1200px; margin: 0 auto; position: relative; }

        /* SLIDER */
        .slider-wrapper { display: flex; align-items: center; gap: var(--gap); overflow-x: auto; padding: 40px 0; scrollbar-width: none; scroll-behavior: smooth; }
        .tile { flex: 0 0 var(--tile-width); background: white; padding: 40px; border-radius: 40px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); text-align: center; border: 1px solid #f0f0f0; transition: 0.5s; opacity: 0.3; transform: scale(0.9); }
        .tile.is-visible { opacity: 1; transform: scale(1.05); box-shadow: 0 15px 40px rgba(30, 58, 138, 0.1); }
        .tile h3 { font-family: 'Playfair Display', serif; color: var(--navy); margin-bottom: 10px; }

        /* BENTO GRID */
        .bento-container { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; margin: 40px 0; }
        .card, .flip-card { background: white; border-radius: 40px; padding: 30px; border: 1px solid #f0f0f0; box-shadow: 0 10px 30px rgba(0,0,0,0.05); min-height: 300px; }
        .flip-card { perspective: 1000px; padding: 0; border: none; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: 0.8s; transform-style: preserve-3d; }
        .flip-card:hover .flip-card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 40px; padding: 30px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; }
        .card-back { background: #f8fafc; transform: rotateY(180deg); align-items: center; }
        .tag { display: inline-block; border: 1px solid var(--gold); color: var(--gold); padding: 5px 15px; border-radius: 50px; font-size: 0.75rem; margin: 5px; font-weight: 600; cursor: help; }

        /* REZERWACJA */
        .booking-card { background: var(--navy); border-radius: 40px; padding: 30px; color: white; text-align: center; position: relative; overflow: hidden; }
        iframe { width: 100%; height: 400px; border-radius: 20px; border: none; filter: invert(90%) hue-rotate(180deg); margin: 20px 0; }
        .form-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: white; color: var(--navy); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .form-overlay.open { display: flex; }
        .contact-box { background: var(--navy); padding: 25px; border-radius: 25px; display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 350px; }
        input { padding: 12px; border-radius: 12px; border: none; }
        .btn-send { background: var(--gold); border: none; padding: 15px; border-radius: 50px; font-weight: 800; cursor: pointer; }

        /* PIANINO */
        .piano-container { width: 100%; display: flex; justify-content: center; overflow-x: auto; padding: 20px 0; scrollbar-width: none; }
        .key { display: flex; align-items: flex-end; justify-content: center; cursor: pointer; border: 1px solid #333; position: relative; box-sizing: border-box; transition: 0.1s; }
        .white { width: var(--key-w); height: var(--key-h); background: white; z-index: 1; border-radius: 0 0 5px 5px; }
        .black { width: var(--black-w); height: var(--black-h); background: #111; margin: 0 var(--black-m); z-index: 2; border-radius: 0 0 3px 3px; }
        .key span { font-size: 9px; padding-bottom: 10px; color: #999; pointer-events: none; }
        .key.playing { background: #ddd !important; transform: translateY(2px); }
        .key.next-note { background: var(--blue) !important; color: white; }
    </style>
</head>
<body>

    <!-- 1. SLIDER -->
    <section>
        <div class="slider-wrapper" id="slider"></div>
    </section>

    <!-- 2. BENTO GRID -->
    <section>
        <div class="bento-container" id="bento">
            <div class="flip-card">
                <div class="flip-card-inner">
                    <div class="card-front">
                        <h2 style="color:var(--navy); font-family:'Playfair Display';">Poznajmy się</h2>
                        <p>Łukasz Ganczarek - pianista i pedagog. Uczę pasji do muzyki.</p>
                    </div>
                    <div class="card-back">
                        <p style="color:var(--navy); font-weight:700;">Wizytówka</p>
                        <p>Zadzwoń: +48 ...</p>
                    </div>
                </div>
            </div>
            <div class="card" style="background:var(--gold); border:none; color:white;">
                <h3 style="color:white; font-family:'Playfair Display';">Edukacja</h3>
                <div class="tag" style="border-color:white; color:white;">Harmonia</div>
                <div class="tag" style="border-color:white; color:white;">Formy muzyczne</div>
                <div class="tag" style="border-color:white; color:white;">Teoria</div>
            </div>
        </div>
    </section>

    <!-- 3. REZERWACJA -->
    <section>
        <div class="booking-card">
            <h2 style="color:var(--gold); font-family:'Playfair Display';">Zarezerwuj Termin</h2>
            <iframe src="https://google.com"></iframe>
            <button onclick="toggleForm(true)" style="padding:15px 40px; border-radius:50px; background:var(--gold); border:none; font-weight:800; cursor:pointer;">OTWÓRZ FORMULARZ</button>
            
            <div class="form-overlay" id="overlay">
                <div class="contact-box">
                    <span onclick="toggleForm(false)" style="color:white; cursor:pointer; text-align:right;">✕ Zamknij</span>
                    <input type="text" id="name" placeholder="Imię i nazwisko">
                    <input type="tel" id="tel" placeholder="Telefon">
                    <button class="btn-send" onclick="send()">WYŚLIJ</button>
                </div>
            </div>
        </div>
    </section>

    <!-- 4. PIANINO -->
    <section style="text-align:center;">
        <h2 style="font-family:'Playfair Display'; color:var(--navy);">Zagraj coś!</h2>
        <div class="piano-container"><div style="display:flex; position:relative; margin: 0 auto;" id="piano"></div></div>
        <div style="margin-top:20px;">
            <button class="tag" onclick="toggleSong(0)">🍎 Jabłuszko</button>
            <button class="tag" onclick="toggleSong(1)">🐱 Kotek</button>
        </div>
    </section>

<script>
    // 1. SLIDER DATA
    const slider = document.getElementById('slider');
    const content = `
        <div class="tile"><h3>Cena</h3><p>99 zł / lekcja</p></div>
        <div class="tile"><h3>Dojazd</h3><p>Gdynia i Sopot</p></div>
        <div class="tile"><h3>Dla kogo</h3><p>Dzieci i dorośli</p></div>
    `;
    slider.innerHTML = content.repeat(5);

    // 2. PIANINO LOGIC
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = ['G','G#','A','A#','H','C','C#','D','D#','E','F','F#'];
    let currentSong = null, step = 0;
    const songs = [
        { name: "Jabłuszko", notes: [5, 9, 12, 12, 7, 10] },
        { name: "Kotek", notes: [12, 9, 9, 10, 7, 7] }
    ];

    for (let i = 0; i < 25; i++) {
        const key = document.createElement('div');
        const noteName = notes[i % 12];
        key.className = `key ${noteName.includes('#') ? 'black' : 'white'}`;
        key.innerHTML = `<span>${noteName}</span>`;
        key.onmousedown = () => { playNote(196 * Math.pow(2, i/12), i); key.classList.add('playing'); };
        key.onmouseup = () => key.classList.remove('playing');
        document.getElementById('piano').appendChild(key);
    }

    function playNote(freq, idx) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 1);
        
        if (currentSong !== null && idx === songs[currentSong].notes[step]) {
            step++;
            if (step >= songs[currentSong].notes.length) { alert("Brawo!"); currentSong = null; step = 0; }
            updateH();
        }
    }

    function toggleSong(idx) { currentSong = idx; step = 0; updateH(); }
    function updateH() {
        document.querySelectorAll('.key').forEach(k => k.classList.remove('next-note'));
        if(currentSong !== null) document.querySelectorAll('.key')[songs[currentSong].notes[step]].classList.add('next-note');
    }

    // 3. FORM & UI
    function toggleForm(v) { document.getElementById('overlay').classList.toggle('open', v); }
    function send() { alert("Wysłano! (Zintegruj z Make.com w kolejnym kroku)"); toggleForm(false); }

    // 4. ANIMATIONS
    window.addEventListener('load', () => {
        document.getElementById('slider').classList.add('revealed');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('is-visible'); });
        }, { threshold: 0.5 });
        document.querySelectorAll('.tile').forEach(t => observer.observe(t));
    });
</script>
</body>
</html>
