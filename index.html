<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://googleapis.com');

  :root {
    --gold: #d4af37;
    --navy: #1e3a8a;
    --bg-clean: #ffffff;
    /* DESKTOP */
    --tile-width: 320px;
    --gap: 60px;
    --h3-size: 1.7rem;
    --p-size: 0.95rem;
  }

  /* --- ZMNIEJSZENIE O POŁOWĘ NA TELEFONACH --- */
  @media (max-width: 768px) {
    :root {
      --tile-width: 170px; /* O połowę mniejszy niż desktop */
      --gap: 15px;
      --h3-size: 1.0rem;   /* Mniejszy tytuł */
      --p-size: 0.75rem;   /* Mniejszy opis */
    }
    .tile { 
      padding: 20px 15px !important; 
      min-height: 190px !important; /* Znacznie niższy kafelek */
      border-radius: 25px !important;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05) !important;
    }
    .nav-btn { 
      width: 35px !important; 
      height: 35px !important; 
      font-size: 0.8rem !important; 
    }
    .tiles-wrapper { padding: 40px 0 !important; }
  }

  /* EKSTREMALNIE MAŁE EKRANY */
  @media (max-width: 480px) {
    :root {
      --tile-width: 145px;
      --h3-size: 0.9rem;
      --p-size: 0.65rem;
    }
    .tile { min-height: 160px !important; }
  }

  body {
    margin: 0;
    padding: 0;
    background-color: var(--bg-clean);
    font-family: 'Poppins', sans-serif;
    display: flex;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .slider-container {
    width: 100%;
    position: relative;
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
    -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
    mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
  }

  .slider-container.revealed { opacity: 1; }

  .tiles-wrapper {
    display: flex;
    align-items: center;
    gap: var(--gap);
    padding: 80px 0;
    overflow-x: auto;
    scrollbar-width: none;
    scroll-behavior: smooth;
  }

  .tiles-wrapper::-webkit-scrollbar { display: none; }

  .tile {
    flex: 0 0 var(--tile-width);
    background: white;
    padding: 50px 40px;
    border-radius: 55px;
    box-sizing: border-box;
    box-shadow: 0 0 25px rgba(0, 0, 0, 0.06); 
    border: 1px solid #f0f0f0;
    min-height: 320px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s, filter 0.8s, box-shadow 0.8s;
    opacity: 0.15;
    transform: scale(0.85);
    filter: blur(4px);
  }

  .tile.is-visible {
    opacity: 1;
    transform: scale(1.05);
    filter: blur(0px);
    box-shadow: 0 20px 50px rgba(30, 58, 138, 0.1);
    border-color: #e5e7eb;
  }

  h3 { 
    font-family: 'Playfair Display', serif; 
    color: var(--navy); 
    font-size: var(--h3-size); 
    margin: 0 0 8px 0; 
  }
  
  p { 
    color: #64748b; 
    font-size: var(--p-size); 
    line-height: 1.4; 
    margin: 0; 
  }

  .highlight { color: var(--gold); font-weight: 600; }

  .nav-btn {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 60px;
    height: 60px;
    background: white;
    border: 1px solid #f0f0f0;
    border-radius: 50%;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    cursor: pointer;
    z-index: 1000;
    font-size: 1.2rem;
    color: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
    opacity: 0;
  }

  .slider-container.revealed ~ .nav-btn { opacity: 1; }
  .nav-btn:hover { background: var(--navy); color: white; transform: translateY(-50%) scale(1.1); }
  .prev-btn { left: 3%; }
  .next-btn { right: 3%; }
</style>
</head>
<body>

<div class="slider-container" id="mainContainer">
  <div class="tiles-wrapper" id="slider"></div>
</div>

<button class="nav-btn prev-btn" id="prev">❮</button>
<button class="nav-btn next-btn" id="next">❯</button>

<script>
  const slider = document.getElementById('slider');
  const container = document.getElementById('mainContainer');
  const nextBtn = document.getElementById('next');
  const prevBtn = document.getElementById('prev');

  const getScrollStep = () => {
    const tile = document.querySelector('.tile');
    const style = window.getComputedStyle(slider);
    const gap = parseInt(style.gap) || 0;
    return tile.offsetWidth + gap;
  };

  const content = `
    <div class="tile"><h3>Instrument</h3><p>Nie masz instrumentu? <span class="highlight">Dowieziemy pianino</span> (+20 zł) lub studio.</p></div>
    <div class="tile"><h3>Dydaktyka</h3><p>Pracujemy na <span class="highlight">autorskich</span> pomocach dopasowanych do ucznia.</p></div>
    <div class="tile"><h3>Koszt</h3><p>Standardowa cena za lekcję to <span class="highlight">99 zł / h</span>.</p></div>
    <div class="tile"><h3>Dla kogo</h3><p>Zapraszamy wszystkich <span class="highlight">od 6 roku życia</span> wzwyż.</p></div>
    <div class="tile"><h3>Miejsce</h3><p>Studio w <span class="highlight">Gdyni</span> lub dojazd: <span class="highlight">Gdynia i Sopot</span>.</p></div>
  `;

  slider.innerHTML = content.repeat(20);

  const resetToCenterOne = () => {
    const allTiles = document.querySelectorAll('.tile');
    const targetIndex = Math.floor(allTiles.length / 2); 
    const targetTile = allTiles[targetIndex];
    const offset = targetTile.offsetLeft - (window.innerWidth / 2) + (targetTile.offsetWidth / 2);
    slider.scrollLeft = offset;
  };

  window.addEventListener('load', () => {
    resetToCenterOne();
    setTimeout(() => { container.classList.add('revealed'); }, 100); 
  });

  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(resetToCenterOne, 150);
  });

  nextBtn.onclick = () => slider.scrollBy({ left: getScrollStep(), behavior: 'smooth' });
  prevBtn.onclick = () => slider.scrollBy({ left: -getScrollStep(), behavior: 'smooth' });

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting && entry.intersectionRatio > 0.6) {
        entry.target.classList.add('is-visible');
      } else {
        entry.target.classList.remove('is-visible');
      }
    });
  }, { root: slider, threshold: 0.6 });

  document.querySelectorAll('.tile').forEach(tile => observer.observe(tile));

<body class="piano-mode">
    <div class="controls-wrapper">
        <button class="btn active" id="p-btn" onclick="changeInst('piano')">Pianino</button>
        <button class="btn" id="h-btn" onclick="changeInst('harpsi')">Klawesyn</button>
        <div class="sep"></div>

            <input type="range" id="volume" min="0" max="1" step="0.05" value="0.4">
        </div>
        <div class="sep"></div>
        <button class="btn btn-song" id="s0" onclick="toggleSong(0)">🍎 Jabłuszko</button>
        <button class="btn btn-song" id="s1" onclick="toggleSong(1)">🐱 Kotek</button>
        <button class="btn btn-song" id="s2" onclick="toggleSong(2)">👨‍🌾 Janie</button>
    </div>

    <div class="piano-container">
        <div class="piano" id="piano"></div>
    </div>

    <div id="status">Wybierz utwór i graj podświetlone klawisze</div>

<script>
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();
    let currentInst = 'piano';
    let currentSong = null;
    let step = 0;

    function unlockAudio() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        window.removeEventListener('touchstart', unlockAudio);
        window.removeEventListener('mousedown', unlockAudio);
    }
    window.addEventListener('touchstart', unlockAudio);
    window.addEventListener('mousedown', unlockAudio);

    const songs = [
        { name: "Czerwone jabłuszko", notes: [5, 9, 12, 12, 7, 10, 12, 10, 9, 7, 5, 12, 5, 9, 12, 12, 7, 10, 12, 10, 9, 7, 9, 5] },
        { name: "Wlazł kotek", notes: [12, 9, 9, 10, 7, 7, 5, 9, 12, 12, 9, 9, 10, 7, 7, 5, 9, 5, 5, 9, 9, 10, 7, 7, 5, 9, 12, 12, 9, 9, 10, 7, 7, 5, 9, 5] },
        { name: "Panie Janie", notes: [5, 7, 9, 5, 5, 7, 9, 5, 9, 10, 12, 9, 10, 12, 12, 14, 12, 10, 9, 5, 12, 14, 12, 10, 9, 5, 5, 0, 5, 5, 0, 5] }
    ];

    function playSound(freq, index) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (currentSong !== null && index === songs[currentSong].notes[step]) {
            step++;
            if (step >= songs[currentSong].notes.length) {
                document.getElementById('status').innerText = "Brawo! Ukończono utwór!";
                const sIndex = currentSong;
                setTimeout(() => toggleSong(sIndex), 100);
            } else { updateHighlight(); }
        }
        const vol = document.getElementById('volume').value;
        const now = audioCtx.currentTime;
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(vol, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 1.2);
        const osc = audioCtx.createOscillator();
        osc.type = (currentInst === 'piano') ? 'triangle' : 'sawtooth';
        osc.frequency.setValueAtTime(freq, now);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(now + 1.2);
    }

    function toggleSong(index) {
        if (currentSong === index) {
            currentSong = null; step = 0;
            document.querySelectorAll('.btn-song').forEach(b => b.classList.remove('active'));
            document.getElementById('status').innerText = "Tryb wolnej gry";
        } else {
            document.querySelectorAll('.btn-song').forEach(b => b.classList.remove('active'));
            currentSong = index; step = 0;
            document.getElementById(`s${index}`).classList.add('active');
            document.getElementById('status').innerText = "Nauka: " + songs[index].name;
        }
        updateHighlight();
    }

    function updateHighlight() {
        document.querySelectorAll('.key').forEach(k => k.classList.remove('next-note'));
        if (currentSong !== null) {
            const target = songs[currentSong].notes[step];
            const keys = document.querySelectorAll('.key');
            if (keys[target]) keys[target].classList.add('next-note');
        }
    }

    function changeInst(inst) {
        currentInst = inst;
        document.body.className = (inst === 'piano') ? 'piano-mode' : 'harpsi-mode';
        document.getElementById('p-btn').classList.toggle('active', inst === 'piano');
        document.getElementById('h-btn').classList.toggle('active', inst === 'harpsi');
    }

    const notesPattern = ['G', 'G#', 'A', 'A#', 'H', 'C', 'C#', 'D', 'D#', 'E', 'F', 'F#'];
    const startFreq = 195.997; 
    const piano = document.getElementById('piano');

    for (let i = 0; i < 25; i++) {
        const noteIndex = i % 12;
        let noteName = notesPattern[noteIndex];
        const freq = startFreq * Math.pow(2, i / 12);
        const key = document.createElement('div');
        const isBlack = noteName.includes('#');
        key.className = `key ${isBlack ? 'black' : 'white'}`;
        let label = (i < 5) ? noteName.toLowerCase() : (i < 17 ? noteName.toUpperCase() + "¹" : noteName.toUpperCase() + "²");
        key.innerHTML = `<span>${label}</span>`;
        key.addEventListener('mousedown', (e) => { e.preventDefault(); key.classList.add('playing'); playSound(freq, i); });
        window.addEventListener('mouseup', () => key.classList.remove('playing'));
        key.addEventListener('touchstart', (e) => { e.preventDefault(); key.classList.add('playing'); playSound(freq, i); }, {passive: false});
        key.addEventListener('touchend', () => { key.classList.remove('playing'); });
        piano.appendChild(key);
    }

        <textarea id="msg" placeholder="Dodatkowe informacje..." oninput="val()"></textarea>
        <button class="btn-submit" id="subBtn" onclick="wyslij()" onmouseenter="checkMissing()" onmouseleave="clearErrors()">WYŚLIJ ZGŁOSZENIE</button>

<script>
  let isStudio = true; let hasPiano = true;
  const hook = 'https://hook.eu1.make.com/d62azmfruksckfjj8gtwyxjvxt9aqdis';

  function toggleForm(show) { document.getElementById('formOverlay').classList.toggle('open', show); }

  function setLoc(loc) {
    isStudio = (loc === 'studio');
    document.getElementById('loc-studio').classList.toggle('selected', isStudio);
    document.getElementById('loc-uczen').classList.toggle('selected', !isStudio);
    document.getElementById('piano-options').style.display = isStudio ? 'none' : 'block';
    updatePrice();
  }

  function setPiano(val) { hasPiano = val; document.getElementById('piano-yes').classList.toggle('selected', hasPiano); document.getElementById('piano-no').classList.toggle('selected', !hasPiano); updatePrice(); }

  function updatePrice() {
    let price = isStudio ? 99 : (hasPiano ? 99 : 119);
    document.getElementById('price-val').innerText = price + " zł / h";
    val();
  }

  function val() {
    const n = document.getElementById('name').value;
    const p = document.getElementById('phone').value.replace(/\D/g, '');
    const btn = document.getElementById('subBtn');
    if(n.length > 2 && p.length >= 9) {
      btn.classList.add('active');
      document.getElementById('tooltip').style.display = "none";
    } else { btn.classList.remove('active'); }
  }

  function checkMissing() {
    const btn = document.getElementById('subBtn');
    if(!btn.classList.contains('active')) {
      const n = document.getElementById('name');
      const p = document.getElementById('phone');
      const tip = document.getElementById('tooltip');
      const phoneDigits = p.value.replace(/\D/g, '').length;
      let msg = [];
      if(n.value.length <= 2) { n.classList.add('error'); msg.push("Imię"); }
      if(phoneDigits < 9) { p.classList.add('error'); msg.push("9 cyfr telefonu"); }
      tip.innerText = "Podaj: " + msg.join(" oraz ");
      tip.style.display = "block";
    }
  }

  function clearErrors() { document.querySelectorAll('input').forEach(i => i.classList.remove('error')); document.getElementById('tooltip').style.display = "none"; }

  function wyslij() {
    const btn = document.getElementById('subBtn');
    if(!btn.classList.contains('active')) return;
    btn.innerText = "WYSYŁANIE...";
    btn.style.pointerEvents = "none";

    const dane = {
        typ: "Rezerwacja Terminu",
        miejsce: isStudio ? "W studio" : "U ucznia",
        pianino: isStudio ? "N/A" : (hasPiano ? "Tak" : "Brak"),
        imie: document.getElementById('name').value,
        telefon: document.getElementById('phone').value,
        wiadomosc: document.getElementById('msg').value,
        cena: document.getElementById('price-val').innerText
    };

    fetch(hook, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(dane) })
    .then(res => { 
      if(res.ok) { 
        btn.innerText = "WYSŁANO!"; 
        btn.style.background = "#22c55e";
        setTimeout(() => { 
          toggleForm(false); 
          // Reset pól zamiast reloadu:
          document.getElementById('name').value = "";
          document.getElementById('phone').value = "";
          document.getElementById('msg').value = "";
          btn.innerText = "WYŚLIJ ZGŁOSZENIE";
          btn.style.background = "";
          btn.style.pointerEvents = "auto";
          btn.classList.remove('active');
        }, 2000); 
      } 
    });
  }

  const observer = new IntersectionObserver((entries) => { entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('active'); }); });
  observer.observe(document.querySelector('.main-section'));

        <button class="btn-submit" id="b-l" onclick="wyslij('lesson')" onmouseenter="showErr('n-l','t-l','f-lesson')" onmouseleave="hideErr('f-lesson')">WYŚLIJ PROŚBĘ</button>
      </div>
    </div>
  </div>

  <!-- MODAL: EMAIL -->
  <div class="form-overlay" id="emailOverlay">
    <span class="close-btn" onclick="toggleOverlay('emailOverlay', false)">✕</span>
    <div class="form-split">
      <div class="form-left"><h3>Napisz e-mail</h3><div class="tile selected">📩 lukaszgkorepetycje@gmail.com</div></div>
      <div class="form-right" id="f-email">
        <div class="tip"></div>
        <input type="text" id="n-e" placeholder="Twoje Imię" oninput="val('email')">
        <input type="email" id="e-e" placeholder="Twój e-mail" oninput="val('email')">
        <textarea id="m-e" placeholder="Treść zapytania..."></textarea>
        <button class="btn-submit" id="b-e" onclick="wyslij('email')" onmouseenter="showErr('n-e','e-e','f-email')" onmouseleave="hideErr('f-email')">WYŚLIJ WIADOMOŚĆ</button>
      </div>
    </div>
  </div>

  <!-- MODAL: WHATSAPP -->
  <div class="form-overlay" id="waOverlay">
    <span class="close-btn" onclick="toggleOverlay('waOverlay', false)">✕</span>
    <div class="form-split">
      <div class="form-left"><h3>WhatsApp</h3><p>Zostaw numer, odezwę się!</p></div>
      <div class="form-right" id="f-wa">
        <div class="tip"></div>
        <input type="text" id="n-w" placeholder="Twoje Imię" oninput="val('wa')">
        <input type="tel" id="t-w" placeholder="Numer telefonu (min. 9 cyfr)" oninput="val('wa')">
        <textarea id="m-w" placeholder="Wiadomość..."></textarea>
        <button class="btn-submit" id="b-w" onclick="wyslij('wa')" onmouseenter="showErr('n-w','t-w','f-wa')" onmouseleave="hideErr('f-wa')">POPROŚ O KONTAKT</button>
      </div>
    </div>
  </div>
</div>

<script>
  // TWOJE WEBHOOKI
  const hooks = {
    lesson: 'https://hook.eu1.make.com/d62azmfruksckfjj8gtwyxjvxt9aqdis',
    email:  'https://hook.eu1.make.com/d62azmfruksckfjj8gtwyxjvxt9aqdis',
    wa:     'https://hook.eu1.make.com/d62azmfruksckfjj8gtwyxjvxt9aqdis'
  };

  let isS = true, hasP = true;

  function toggleOverlay(id, show) { document.getElementById(id).classList.toggle('open', show); }

  function setLoc(l) {
    isS = (l === 's');
    document.getElementById('l-s').classList.toggle('selected', isS);
    document.getElementById('l-u').classList.toggle('selected', !isS);
    document.getElementById('piano-select-box').style.display = isS ? 'none' : 'block';
    updateP();
  }

  function setPiano(v) { hasP = v; document.getElementById('p-y').classList.toggle('selected', hasP); document.getElementById('p-n').classList.toggle('selected', !hasP); updateP(); }
  function updateP() { let p = isS ? 99 : (hasP ? 99 : 119); document.getElementById('p-val').innerText = p + " zł / h"; }

  function val(type) {
    let n, c, btn;
    if(type==='lesson') { n=document.getElementById('n-l'); c=document.getElementById('t-l'); btn=document.getElementById('b-l'); }
    if(type==='email') { n=document.getElementById('n-e'); c=document.getElementById('e-e'); btn=document.getElementById('b-e'); }
    if(type==='wa') { n=document.getElementById('n-w'); c=document.getElementById('t-w'); btn=document.getElementById('b-w'); }
    const digits = c.value.replace(/\D/g, '').length;
    const isContactOk = type === 'email' ? c.value.includes('@') : digits >= 9;
    btn.classList.toggle('active', n.value.length > 2 && isContactOk);
  }

  function showErr(nI, cI, fId) {
    const n = document.getElementById(nI), c = document.getElementById(cI), f = document.getElementById(fId);
    const tip = f.querySelector('.tip');
    if(!f.querySelector('.btn-submit').classList.contains('active')) {
      const digits = c.value.replace(/\D/g, '').length;
      const isEmail = c.type === 'email';
      const isContactInvalid = isEmail ? !c.value.includes('@') : digits < 9;
      const isNameInvalid = n.value.length <= 2;
      let msg = [];
      if(isNameInvalid) { n.classList.add('error'); msg.push("Imię"); }
      if(isContactInvalid) { c.classList.add('error'); msg.push(isEmail ? "E-mail" : "9 cyfr tel."); }
      tip.innerText = "Podaj: " + msg.join(" oraz ");
      tip.style.display = 'block';
    }
  }

  function hideErr(fId) {
    const f = document.getElementById(fId);
    f.querySelectorAll('input').forEach(i => i.classList.remove('error'));
    f.querySelector('.tip').style.display = 'none';
  }

  function wyslij(type) {
    let n, c, m, fId, overlayId;
    if(type==='lesson') { n='n-l'; c='t-l'; m='m-l'; fId='f-lesson'; overlayId='lessonOverlay'; }
    if(type==='email') { n='n-e'; c='e-e'; m='m-e'; fId='f-email'; overlayId='emailOverlay'; }
    if(type==='wa') { n='n-w'; c='t-w'; m='m-w'; fId='f-wa'; overlayId='waOverlay'; }

    const btn = document.getElementById(fId).querySelector('.btn-submit');
    if(!btn.classList.contains('active')) return;

    btn.innerText = "WYSYŁANIE...";
    
    // PRZYGOTOWANIE DANYCH - WYDZIELONE POLA DLA LEKCJI
    const body = {
      typ: type === 'lesson' ? 'Lekcja Próbna' : (type === 'email' ? 'Email' : 'WhatsApp'),
      imie: document.getElementById(n).value,
      kontakt: document.getElementById(c).value,
      wiadomosc: document.getElementById(m).value,
      // WYDZIELONE POLA:
      miejsce: type === 'lesson' ? (isS ? 'W studio' : 'U ucznia') : 'N/A',
      cena: type === 'lesson' ? document.getElementById('p-val').innerText : 'N/A',
      pianino: type === 'lesson' ? (isS ? 'N/A' : (hasP ? 'Uczeń posiada' : 'Brak - dowóz')) : 'N/A'
    };

    fetch(hooks[type], { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
    .then(() => {
      btn.innerText = "WYSŁANO!";
      btn.style.background = "#22c55e";
      setTimeout(() => {
        toggleOverlay(overlayId, false);
        document.querySelectorAll(`#${fId} input, #${fId} textarea`).forEach(i => i.value = '');
        btn.classList.remove('active');
        btn.innerText = "WYŚLIJ";
        btn.style.background = "";
      }, 2000);
    });
  }
  </script>
</body>
</html>
